        .hr-section input[type="file"], .hr-section input[type="date"], .hr-section input[type="text"],

    <script>
        // ==========================================
        // 全部 JavaScript（完整保留原功能）

        const DB_NAME = "ColiAppDB";
        const STORE_FLATMIX = "FlatMixStore";
        const STORE_ROSTER = "RosterStore";
        const DB_VERSION = 2;

        function openDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, DB_VERSION);
                req.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_FLATMIX)) db.createObjectStore(STORE_FLATMIX, { keyPath: "id" });
                    if (!db.objectStoreNames.contains(STORE_ROSTER)) db.createObjectStore(STORE_ROSTER, { keyPath: "id" });
                };
                req.onsuccess = (e) => resolve(e.target.result);
                req.onerror = (e) => reject(e.target.error);
            });
        }

        async function saveDataToDB(storeName, dataId, data) {
            try {
                const db = await openDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction([storeName], "readwrite");
                    const store = tx.objectStore(storeName);
                    store.put({ id: dataId, data: data });
                    tx.oncomplete = resolve;
                    tx.onerror = reject;
                });
            } catch(e) { console.error("DB Save Error", e); }
        }

        async function loadDataFromDB(storeName, dataId) {
            try {
                const db = await openDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction([storeName], "readonly");
                    const store = tx.objectStore(storeName);
                    const req = store.get(dataId);
                    req.onsuccess = () => resolve(req.result ? req.result.data : null);
                    req.onerror = reject;
                });
            } catch(e) { console.error("DB Load Error", e); return null; }
        }

        function resetData(storeName, statusId, uploadRowId, resetBtnId, labelId, defaultLabel) {
            if(confirm("確定要清除現有數據並重新上載嗎？")) {
                if(storeName === STORE_FLATMIX) flatMixData = [];
                if(storeName === STORE_ROSTER) rosterData = [];
                
                document.getElementById(uploadRowId).style.display = 'block';
                document.getElementById(resetBtnId).style.display = 'none';
                document.getElementById(statusId).innerText = "⚠️ 數據已清除，請重新上載";
                document.getElementById(statusId).style.color = "#d9534f";
                document.getElementById(labelId).innerText = defaultLabel;
                
                openDB().then(db => {
                    const tx = db.transaction([storeName], "readwrite");
                    tx.objectStore(storeName).delete(storeName === STORE_FLATMIX ? "flatMixData" : "rosterData");
                });
            }
        }
        
        function resetRoster() {
            resetData(STORE_ROSTER, 'uploadStatus', 'rosterUploadRow', 'resetRosterBtn', 'rosterUploadLabel', '📂 首次設定：上載更表 Excel (.xlsx) [灣畔/雙鑽/HR共用]');
        }

        let rosterData = []; 
        let rosterYear = ""; let rosterMonth = ""; let daysInMonth = 31;
        let employeeList = []; 
        let savedLogoBase64 = "";
        let flatMixData = []; 

        const WORK_LOCATIONS = { 'C': { time: '09:00–17:30', desc: '公司(PP3)' }, 'OV': { time: '10:30–19:00', desc: '維港1號(現樓)' }, 'K': { time: '10:30–19:00', desc: '九龍灣國際交易中心' }, 'F': { time: '10:30–19:00', desc: '飛鵝山道3號(現樓)' }, 'TV': { time: '10:30–19:00', desc: '維港．雙鑽(現樓)' }, 'VV': { time: '10:30–19:00', desc: '維港‧灣畔(現樓)' }, 'VW': { time: '10:30–19:00', desc: '維港‧灣畔(現樓)' } };
        const EXACT_LEAVE_TYPES = { 'FL':'喪假', 'Q':'居家隔離', 'ML':'產假', 'PL':'侍產假', 'M':'婚假', 'BL':'生日假', 'CL':'關懷假', 'VL':'義工補假', 'V':'疫苗假', 'WFH':'在家工作', 'JSL':'陪審員假', 'EL':'額外假期', 'SL':'進修假', 'NPL':'無薪假', '/':'半天假' };
        const SYMBOL_LEAVE_TYPES = { '▲':'例假', '✽':'補假', '●':'超時工作補假', '★':'病假', '■':'年假', '◎':'事假' };
        const salesPool = ["Moon", "Joe", "Andrew", "Ankie", "Eric", "Stephen", "Peter"]; const internPool = ["Sammi", "Karina", "Renne"];
        const defaultVVFlats = [ { label: "1房", value: "T1A-17C" }, { label: "2房（開廚）", value: "T1A-17D, T1A-17E, T1B-17B" }, { label: "2房（梗廚）", value: "T1C-17G" }, { label: "2房+儲物房（梗廚）", value: "T1B-17A, T2A-17A, T2B-17J, T2A-17J" }, { label: "3房1套（開廚）", value: "T5B-17B" }, { label: "3房1套+工作間連洗手間", value: "*T1A-17A, T1A-17B, T5B-17A" } ];
        const defaultTVFlats = [ { label: "開放式", value: "T2A-21C" }, { label: "2房開廚", value: "T1A-21F, T2A-21A, T2B-21D" }, { label: "2房梗廚", value: "T1B-21H, T2A-21G, T2B-21E" }, { label: "3房1套(儲)", value: "#T2B-21G" }, { label: "3房1套(連工人套)", value: "*T2B-21F" } ];
        let vvFlats = [], tvFlats = [];

        window.onload = async function() { 
            document.getElementById('vvDutyDate').valueAsDate = new Date(); 
            document.getElementById('tvDutyDate').valueAsDate = new Date(); 
            loadSettings(); 
            
            const savedFlatMix = await loadDataFromDB(STORE_FLATMIX, "flatMixData");
            if (savedFlatMix && savedFlatMix.length > 0) {
                flatMixData = savedFlatMix;
                document.getElementById('flatMixStatus').innerText = `✅ Flat Mix 數據庫已永久內置 (${flatMixData.length} 筆數據)`;
                document.getElementById('flatMixStatus').style.color = "#28a745";
                document.getElementById('flatMixUploadRow').style.display = 'none'; 
                document.getElementById('resetFlatMixBtn').style.display = 'inline-block'; 
                document.getElementById('flatMixUploadLabel').innerText = "📂 Flat Mix 數據庫狀態";
            }

            const savedRoster = await loadDataFromDB(STORE_ROSTER, "rosterData");
            if (savedRoster && savedRoster.length > 0) {
                rosterData = savedRoster;

                document.getElementById('uploadStatus').style.color = "#28a745";
                document.getElementById('rosterUploadRow').style.display = 'none'; 
                document.getElementById('resetRosterBtn').style.display = 'inline-block'; 
                document.getElementById('rosterUploadLabel').innerText = "📂 更表數據庫狀態";
                
                if (rosterData[1] && rosterData[1][0]) { const match = rosterData[1][0].match(/(\d{4})年(\d{1,2})月份/); if (match) { rosterYear = match[1]; rosterMonth = match[2]; daysInMonth = new Date(rosterYear, rosterMonth, 0).getDate(); } }
                populateEmployeeDropdown(); generateMessage('vv'); generateMessage('tv'); 
            }
        };

        function render688Table(data, startRow) {
            const headers = data[startRow];
            const idxNo = headers.findIndex(h => typeof h === 'string' && h.includes('序號'));
            const idxProj = headers.findIndex(h => typeof h === 'string' && h.includes('項目'));
            const idxQty = headers.findIndex(h => typeof h === 'string' && h.includes('售出數量'));
            const idxAmt = headers.findIndex(h => typeof h === 'string' && h.includes('合約額'));
            const idxPrice = headers.findIndex(h => typeof h === 'string' && h.includes('呎價'));
            const idxStake = headers.findIndex(h => typeof h === 'string' && h.includes('我司權益'));
            const idxRealAmt = headers.findIndex(h => typeof h === 'string' && h.includes('實益數'));

            let html = '<table id="sales688Table" class="hr-sales-table">';
            html += '<thead><tr><th>序號</th><th>項目</th><th>售出數量</th><th>合約額 (HK$)</th><th>呎價 (HK$)</th><th>我司權益</th><th>實益數 (HK$)</th></tr></thead><tbody>';

            for (let i = startRow + 1; i < data.length; i++) {
                const row = data[i];
                if (!row) continue;
                const projVal = row[idxProj];
                const amtVal = row[idxAmt];
                if (amtVal === undefined && projVal === undefined) break;

                const no = row[idxNo] || "";
                const proj = projVal || "";
                const qty = row[idxQty] || "";
                const amt = formatNumber(amtVal);
                const price = formatNumber(row[idxPrice]);
                const stake = formatNumber(row[idxStake], true);
                const realAmt = formatNumber(row[idxRealAmt]);
                
                let trClass = "";
                if (proj.toString().includes("總計") || proj.toString().includes("合計")) trClass = 'class="total-row"';
                
                html += `<tr ${trClass}>
                    <td>${no}</td><td>${proj}</td><td>${qty}</td><td>${amt}</td><td>${price}</td><td>${stake}</td><td>${realAmt}</td>
                </tr>`;
            }
            html += '</tbody></table>';
            document.getElementById('table688Container').innerHTML = html;
        }

        function export688Table() {
            const table = document.getElementById('sales688Table');
            if (!table) { alert("請先上載 688 Excel 以生成表格！"); return; }
            const wb = XLSX.utils.table_to_book(table, {sheet: "銷售概況"});
            XLSX.writeFile(wb, '688每周銷售概況.xlsx');
        }

        (function() {
            const toggle = document.getElementById('themeToggle');
            const icon = document.getElementById('themeIcon');
            const label = document.getElementById('themeLabel');
            const html = document.documentElement;

            const savedTheme = localStorage.getItem('cohl-theme');
            if (savedTheme === 'dark') {
                html.setAttribute('data-theme', 'dark');
                icon.textContent = '☀️';
                label.textContent = '淺色';
            }

            toggle.addEventListener('click', function() {
                const isDark = html.getAttribute('data-theme') === 'dark';
                if (isDark) {
                    html.removeAttribute('data-theme');
                    localStorage.setItem('cohl-theme', 'light');
                    icon.textContent = '🌙';
                    label.textContent = '深色';
                } else {
                    html.setAttribute('data-theme', 'dark');
                    localStorage.setItem('cohl-theme', 'dark');
                    icon.textContent = '☀️';
                    label.textContent = '淺色';
                }
            });
        })();

        document.querySelectorAll('.dropdown-toggle').forEach(function(toggle) {
            toggle.addEventListener('click', function(e) {
                e.preventDefault();
                var parent = this.closest('.dropdown');
                if (parent) {
                    parent.classList.toggle('active');
                }
            });
        });
    </script>
</body>
</html>
